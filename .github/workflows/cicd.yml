name: Springboot CI/CD 

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: self-hosted

    env:
      ECR_REPO: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/springboot-application

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Build app
      - name: Build Maven
        run: mvn clean package -DskipTests

      # 3. Create tag
      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}" >> $GITHUB_ENV

      # 4. AWS creds
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 5. Login ECR
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
          docker login --username AWS --password-stdin $ECR_REPO

      # 6. Build image
      - name: Build Docker image
        run: docker build -t $ECR_REPO:${{ env.IMAGE_TAG }} .

      # 7. Push image
      - name: Push Docker image
        run: docker push $ECR_REPO:${{ env.IMAGE_TAG }}

      # 8. Setup SSH key
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # 9. Add EC2 host key
      - name: Add EC2 to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.EC2_IP }} >> ~/.ssh/known_hosts

      # 10. Deploy
      - name: Deploy to EC2
        run: |
          ssh ubuntu@${{ secrets.EC2_IP }} "
              cd /home/ubuntu/Github-actions &&

          # Login to ECR
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
          docker login --username AWS --password-stdin $ECR_REPO

          # Export DB variables
          export POSTGRES_USER='${{ secrets.POSTGRES_USER }}'
          export POSTGRES_PASSWORD='${{ secrets.POSTGRES_PASSWORD }}'
          export POSTGRES_DB='${{ secrets.POSTGRES_DB }}'

          export SPRING_DATASOURCE_URL='${{ secrets.SPRING_DATASOURCE_URL }}'
          export SPRING_DATASOURCE_USERNAME='${{ secrets.SPRING_DATASOURCE_USERNAME }}'
          export SPRING_DATASOURCE_PASSWORD='${{ secrets.SPRING_DATASOURCE_PASSWORD }}'

          # Set image dynamically
          export APP_IMAGE=$ECR_REPO:${{ env.IMAGE_TAG }}

          # Pull latest image
          docker pull \$APP_IMAGE

          # Deploy using compose
          docker-compose down || true
          docker-compose up -d
      
          "
    
          
            
        

   

     

      
        

    

