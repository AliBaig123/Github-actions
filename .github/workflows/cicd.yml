name: Spring Boot CICD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with Maven
        run: mvn clean install

      - name: Build Docker image
        run: docker build -t app:1 .

      - name: Stop old container
        run: docker stop app-container || true

      - name: Remove old container
        run: docker rm app-container || true

      - name: Run container
        env:
          POSTGRES_USER: ${{ secrets.USER }}
          POSTGRES_PASSWORD: ${{ secrets.PASSWD }}
          POSTGRES_DB: ${{ secrets.DATABASE }}
          SPRING_DATASOURCE_URL: ${{ secrets.APP_CREDS_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.APP_CREDS_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.APP_CREDS_PASSWD }}
        run: docker compose up -d --build
      
