name: Springboot-Application CI pipeline build docker image and push to ECR private repo

on:
 push:
  branches: ["main"]


jobs:
 build:
  runs-on: self-hosted

  steps:
   - name: checkout code
     uses: actions/checkout@v4

   - name: build maven
     run: mvn clean package -DskipTests

   - name: set image tag
     run: echo "IMAGE_TAG=${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}" >> $GITHUB_ENV

   - name: configure AWS creds for login of Github actions
     uses: aws-actions/configure-aws-credentials@v4
     with:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      aws-region: ${{ secrets.AWS_REGION }}

   - name: Login to AWS ECR
     run: |
      aws ecr get-login-password | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
      
   - name: build docker image 
     run: docker build -t application:${{ env.IMAGE_TAG }} .

   - name: tag docker image
     run: |
          docker tag application:${{ env.IMAGE_TAG }} \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/springboot-application:${{ env.IMAGE_TAG }}

   - name: push docker image
     run: |
       docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/springboot-application:${{ env.IMAGE_TAG }}

   

     

      
        

    

