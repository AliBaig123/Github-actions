name: Springboot CI pipeline (Docker → ECR)

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: self-hosted

    env:
      ECR_REPO: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/springboot-application

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Maven
        run: mvn clean package -DskipTests

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
          docker login --username AWS --password-stdin $ECR_REPO

      - name: Build and tag Docker image
        run: |
          docker build -t $ECR_REPO:${{ env.IMAGE_TAG }} .

      - name: Push Docker image
        run: |
          docker push $ECR_REPO:${{ env.IMAGE_TAG }}

      - name: Cleanup Docker (avoid disk bloat on self-hosted)
        run: docker image prune -f

   

     

      
        

    

